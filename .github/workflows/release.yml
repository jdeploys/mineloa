name: desktop-release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  windows-x64:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0
          cache: npm
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: MINGW64
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            nasm
      - run: npm ci
      - run: npm run test:release
      - name: Build pinned Windows local runtime
        shell: pwsh
        run: |
          $runtimeLog = Join-Path $PWD 'runtime-build.log'
          ./scripts/build-local-runtime.ps1 -Arch x64 -FfmpegShell msys2 *>&1 | Tee-Object -LiteralPath $runtimeLog
      - name: Package unsigned Windows x64
        run: npm run package:win:x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Verify packaged Windows runtime
        shell: pwsh
        run: |
          node scripts/verify-package.mjs dist/win-unpacked | Tee-Object package-verification.log
          Select-String -LiteralPath package-verification.log -SimpleMatch '"localRuntime":true'
      - name: Normalize release asset
        run: node scripts/prepare-release-assets.mjs .exe windows x64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: diagnostics-windows-x64
          path: |
            runtime-build.log
            package-verification.log
            build/local-runtime/win32-x64/runtime-manifest.json
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows-x64
          path: release-assets/Mineloa-*-windows-x64.exe
          if-no-files-found: error

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            app-dir: dist/mac/Mineloa.app
          - arch: arm64
            runner: macos-15
            app-dir: dist/mac-arm64/Mineloa.app
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - name: Install App Store Connect API key
        env:
          ASC_API_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "$ASC_API_PRIVATE_KEY"
          test -n "$ASC_API_KEY_ID"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          printf '%s' "$ASC_API_PRIVATE_KEY" > "$key"
          chmod 600 "$key"
          printf 'APPLE_API_KEY=%s\n' "$key" >> "$GITHUB_ENV"
      - name: Build pinned macOS local runtime
        run: |
          set -euo pipefail
          if [[ "${{ matrix.arch }}" == x64 ]]; then
            brew install nasm
          fi
          bash ./scripts/build-local-runtime.sh "${{ matrix.arch }}" 2>&1 | tee runtime-build.log
      - name: Package macOS ${{ matrix.arch }}
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_NAME: 'Developer ID Application: CHANMI KIM (J3W2GDPJ7Y)'
          APPLE_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          npm run package:mac:${{ matrix.arch }} -- --config.mac.notarize=true
      - name: Verify packaged macOS runtime
        run: |
          set -euo pipefail
          node scripts/verify-package.mjs "${{ matrix.app-dir }}" | tee package-verification.log
          grep -F '"localRuntime":true' package-verification.log
      - name: Verify native architecture and signing state
        run: |
          set -euo pipefail
          runtime="${{ matrix.app-dir }}/Contents/Resources/local-runtime/darwin-${{ matrix.arch }}"
          file "${{ matrix.app-dir }}/Contents/MacOS/Mineloa" "$runtime/whisper-cli" "$runtime/ffmpeg" | tee signature-diagnostics.log
          expected_arch="${{ matrix.arch }}"
          [[ "$expected_arch" == x64 ]] && expected_arch=x86_64
          grep -E "whisper-cli:[[:space:]]+Mach-O 64-bit executable ${expected_arch}$" signature-diagnostics.log
          grep -E "ffmpeg:[[:space:]]+Mach-O 64-bit executable ${expected_arch}$" signature-diagnostics.log
          codesign --verify --deep --strict --verbose=2 "${{ matrix.app-dir }}" 2>&1 | tee -a signature-diagnostics.log
          codesign -dv --verbose=4 "${{ matrix.app-dir }}" > app-signature.txt 2>&1
          codesign -dv --verbose=4 "$runtime/whisper-cli" > whisper-signature.txt 2>&1
          codesign -dv --verbose=4 "$runtime/ffmpeg" > ffmpeg-signature.txt 2>&1
          cat app-signature.txt whisper-signature.txt ffmpeg-signature.txt >> signature-diagnostics.log
          grep -F 'Authority=Developer ID Application: CHANMI KIM (J3W2GDPJ7Y)' app-signature.txt
          grep -F 'TeamIdentifier=J3W2GDPJ7Y' app-signature.txt
          diff <(grep '^Authority=' app-signature.txt) <(grep '^Authority=' whisper-signature.txt)
          diff <(grep '^Authority=' app-signature.txt) <(grep '^Authority=' ffmpeg-signature.txt)
          diff <(grep '^TeamIdentifier=' app-signature.txt) <(grep '^TeamIdentifier=' whisper-signature.txt)
          diff <(grep '^TeamIdentifier=' app-signature.txt) <(grep '^TeamIdentifier=' ffmpeg-signature.txt)
          xcrun stapler validate "${{ matrix.app-dir }}" 2>&1 | tee -a signature-diagnostics.log
          spctl --assess --type execute --verbose=4 "${{ matrix.app-dir }}" 2>&1 | tee -a signature-diagnostics.log
          echo 'DEVELOPER ID SIGNED AND NOTARIZED' | tee -a signature-diagnostics.log
      - name: Normalize release asset
        run: node scripts/prepare-release-assets.mjs .dmg macos ${{ matrix.arch }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: diagnostics-macos-${{ matrix.arch }}
          path: |
            runtime-build.log
            package-verification.log
            signature-diagnostics.log
            app-signature.txt
            whisper-signature.txt
            ffmpeg-signature.txt
            build/local-runtime/darwin-${{ matrix.arch }}/runtime-manifest.json
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: release-assets/Mineloa-*-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-x64, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Verify tag, complete asset set, and checksums
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          test "$GITHUB_REF_NAME" = "v${VERSION}"
          test -f "release-assets/Mineloa-${VERSION}-windows-x64.exe"
          test -f "release-assets/Mineloa-${VERSION}-macos-x64.dmg"
          test -f "release-assets/Mineloa-${VERSION}-macos-arm64.dmg"
          sha256sum "release-assets/Mineloa-${VERSION}-windows-x64.exe" "release-assets/Mineloa-${VERSION}-macos-x64.dmg" "release-assets/Mineloa-${VERSION}-macos-arm64.dmg" > release-assets/SHA256SUMS.txt
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - name: Publish prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            "release-assets/Mineloa-${VERSION}-windows-x64.exe"
            "release-assets/Mineloa-${VERSION}-macos-x64.dmg"
            "release-assets/Mineloa-${VERSION}-macos-arm64.dmg"
            "release-assets/SHA256SUMS.txt"
          )
          notes="Mineloa desktop prerelease. macOS builds are Developer ID signed and notarized by Apple."
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber "${assets[@]}" --repo "${{ github.repository }}"
            gh release edit "$TAG" --repo "${{ github.repository }}" --prerelease --title "Mineloa ${VERSION}" --notes "$notes"
          else
            gh release create "$TAG" "${assets[@]}" --repo "${{ github.repository }}" --prerelease --title "Mineloa ${VERSION}" --notes "$notes"
          fi
