name: mac-direct-release

on:
  workflow_dispatch:
    inputs:
      arch:
        description: macOS architecture
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64

permissions:
  contents: read

concurrency:
  group: mac-direct-release-${{ github.ref }}-${{ inputs.arch }}
  cancel-in-progress: false

jobs:
  build-sign-notarize:
    runs-on: ${{ inputs.arch == 'x64' && 'macos-15-intel' || 'macos-15' }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - name: Validate release candidate
        run: npm run lint && npm run typecheck && npm run rebuild:node && npm run test:unit && npm run test:integration
      - name: Build pinned local runtime
        run: |
          set -euo pipefail
          if [[ "${{ inputs.arch }}" == x64 ]]; then
            brew install nasm
          fi
          bash ./scripts/build-local-runtime.sh "${{ inputs.arch }}" 2>&1 | tee runtime-build.log
      - name: Install App Store Connect API key
        env:
          ASC_API_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "$ASC_API_PRIVATE_KEY"
          test -n "$ASC_API_KEY_ID"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          printf '%s' "$ASC_API_PRIVATE_KEY" > "$key"
          chmod 600 "$key"
          printf 'APPLE_API_KEY=%s\n' "$key" >> "$GITHUB_ENV"
      - name: Build, sign, and notarize DMG
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_NAME: 'Developer ID Application: CHANMI KIM (J3W2GDPJ7Y)'
          APPLE_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          npm run package:mac:${{ inputs.arch }} -- --config.mac.notarize=true
      - name: Verify Developer ID and notarization
        run: |
          set -euo pipefail
          if [[ "${{ inputs.arch }}" == arm64 ]]; then
            app='dist/mac-arm64/Mineloa.app'
          else
            app='dist/mac/Mineloa.app'
          fi
          dmg=$(find dist -maxdepth 1 -type f -name 'Mineloa-*-mac-${{ inputs.arch }}.dmg' -print -quit)
          test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | tee signature-diagnostics.log
          grep -F 'Authority=Developer ID Application: CHANMI KIM (J3W2GDPJ7Y)' signature-diagnostics.log
          grep -F 'TeamIdentifier=J3W2GDPJ7Y' signature-diagnostics.log
          xcrun stapler validate "$app" 2>&1 | tee -a signature-diagnostics.log
          spctl --assess --type execute --verbose=4 "$app" 2>&1 | tee -a signature-diagnostics.log
          hdiutil verify "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg" 2>&1 | tee -a signature-diagnostics.log
          printf 'DMG_PATH=%s\n' "$dmg" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mineloa-macos-${{ inputs.arch }}-${{ github.run_number }}
          path: |
            ${{ env.DMG_PATH }}
            runtime-build.log
            signature-diagnostics.log
          if-no-files-found: error
